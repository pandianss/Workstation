<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Cinzel:wght@700;900&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg:      #010C1E;
    --gold:    #C9963A;
    --gold-lt: #F0CE78;
    --white:   #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#000;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:'Josefin Sans', sans-serif;
}

#poster {
    width:1080px;
    height:1920px;
    position:relative;
    overflow:hidden;
    background:var(--bg);
}

.bg-layer {
    position:absolute; inset:0;
    background:
        radial-gradient(ellipse 850px 850px at 50% 58%, rgba(170,108,8,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 1100px 480px at 50% 0%, rgba(8,32,100,0.6) 0%, transparent 60%),
        linear-gradient(170deg, #071440 0%, #020C1E 50%, #030F26 100%);
}

.corner { position:absolute; width:110px; height:110px; z-index:4; }
.corner.tl { top:44px; left:44px;   border-top:1.5px solid rgba(201,150,58,0.4); border-left:1.5px solid rgba(201,150,58,0.4); }
.corner.tr { top:44px; right:44px;  border-top:1.5px solid rgba(201,150,58,0.4); border-right:1.5px solid rgba(201,150,58,0.4); }
.corner.bl { bottom:44px; left:44px;  border-bottom:1.5px solid rgba(201,150,58,0.4); border-left:1.5px solid rgba(201,150,58,0.4); }
.corner.br { bottom:44px; right:44px; border-bottom:1.5px solid rgba(201,150,58,0.4); border-right:1.5px solid rgba(201,150,58,0.4); }

.content {
    position:relative; z-index:10;
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:82px 80px 70px;
}

.logo-wrap {
    filter:drop-shadow(0 0 24px rgba(255,255,255,0.2));
    margin-bottom:48px; flex-shrink:0;
}
.logo-wrap img { max-width:310px; max-height:145px; object-fit:contain; }

.eyebrow {
    display:flex; align-items:center; gap:16px; margin-bottom:12px;
}
.eyebrow-dot {
    width:7px; height:7px; background:var(--gold); border-radius:50%;
    box-shadow:0 0 10px 4px rgba(201,150,58,0.55); flex-shrink:0;
}
.eyebrow-text {
    font-size:26px; font-weight:400; letter-spacing:0.48em;
    color:#FEF3C7; text-transform:uppercase; opacity:0.82; white-space:nowrap;
}

.bday-headline {
    font-family:'Cormorant Garamond', serif;
    font-size:148px; font-weight:700; font-style:italic;
    line-height:0.88; color:#fff; letter-spacing:-1px;
    text-shadow:0 0 80px rgba(201,150,58,0.28), 0 6px 24px rgba(0,0,0,0.7);
    white-space:nowrap; flex-shrink:0;
}

.rule {
    display:flex; align-items:center; gap:14px;
    margin:28px 0; width:660px; flex-shrink:0;
}
.rule-line {
    flex:1; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    opacity:0.5;
}
.rule-diamond {
    width:9px; height:9px; background:var(--gold);
    transform:rotate(45deg); flex-shrink:0;
    box-shadow:0 0 7px 2px rgba(201,150,58,0.55);
}

.photo-wrap {
    position:relative; width:620px; height:620px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.orbit {
    position:absolute; inset:-22px; border-radius:50%;
    border:1px solid rgba(201,150,58,0.22);
    animation:orbit 22s linear infinite;
}
.orbit-dot {
    position:absolute; top:50%; left:-5px; margin-top:-5px;
    width:10px; height:10px; background:var(--gold); border-radius:50%;
    box-shadow:0 0 10px 3px rgba(201,150,58,0.8);
}
@keyframes orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.photo-ring {
    position:absolute; inset:0; border-radius:50%;
    border:10px double var(--gold);
    animation:ringPulse 4s ease-in-out infinite;
}
@keyframes ringPulse {
    0%,100% { box-shadow:0 0 40px 10px rgba(201,150,58,0.2), inset 0 0 30px rgba(201,150,58,0.07); }
    50%      { box-shadow:0 0 90px 35px rgba(201,150,58,0.32), inset 0 0 50px rgba(201,150,58,0.12); }
}
.photo-ring-inner { position:absolute; inset:15px; border-radius:50%; border:1px solid rgba(201,150,58,0.38); }
.photo-circle {
    width:598px; height:598px; border-radius:50%; overflow:hidden;
    background:radial-gradient(circle at 40% 35%, #16296A, #061232, #010816);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.photo-circle img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-placeholder { display:none; flex-direction:column; align-items:center; }
.photo-placeholder svg { opacity:0.38; width:210px; height:210px; }
.photo-glow {
    position:absolute; bottom:-35px; left:50%; transform:translateX(-50%);
    width:480px; height:80px;
    background:radial-gradient(ellipse, rgba(201,150,58,0.28) 0%, transparent 70%);
    filter:blur(18px); pointer-events:none;
}

.details { margin-top:44px; text-align:center; width:100%; flex-shrink:0; }
.stars-row {
    display:flex; align-items:center; justify-content:center;
    gap:10px; margin-bottom:16px; color:var(--gold);
    font-size:15px; opacity:0.65; letter-spacing:5px;
}
.stars-row .big { font-size:21px; opacity:1; }
.emp-name {
    font-family:'Cinzel', serif; font-size:88px; font-weight:900;
    line-height:1; color:#fff; letter-spacing:2px; white-space:nowrap;
    display:block; text-shadow:0 4px 28px rgba(0,0,0,0.45);
}
.desig-pill {
    display:inline-flex; align-items:center; gap:10px; margin-top:24px;
    padding:14px 50px; border-radius:100px;
    background:rgba(201,150,58,0.10); border:1px solid rgba(201,150,58,0.50);
    font-size:30px; font-weight:600; letter-spacing:0.14em;
    color:var(--gold-lt); text-transform:uppercase; white-space:nowrap;
}
.desig-pill::before,.desig-pill::after { content:'✦'; font-size:13px; color:var(--gold); opacity:0.7; }
.branch-text {
    margin-top:18px; font-size:27px; font-weight:300;
    letter-spacing:0.42em; color:rgba(255,255,255,0.38); text-transform:uppercase;
}

/* Confetti animation */
.confetti-piece {
    position:absolute; pointer-events:none; z-index:6;
    animation:confettiFall var(--dur) var(--del) ease-in-out infinite;
}
@keyframes confettiFall {
    0%   { transform:translateY(var(--sy)) rotate(0deg)        scale(1);   opacity:0; }
    8%   { opacity:var(--op); }
    92%  { opacity:var(--op); }
    100% { transform:translateY(var(--ey)) rotate(var(--rot))  scale(0.75); opacity:0; }
}

/* Sparkle dots */
.sparkle {
    position:absolute; border-radius:50%; pointer-events:none; z-index:6;
    background:rgba(201,150,58,0.75);
    animation:sparklePulse var(--dur) var(--del) ease-in-out infinite alternate;
}
@keyframes sparklePulse {
    0%   { transform:translateY(0) scale(1);    opacity:var(--lo); }
    100% { transform:translateY(-40px) scale(1.4); opacity:var(--hi); }
}

/* Balloon float */
.balloon-svg {
    position:absolute; pointer-events:none; z-index:7;
    animation:balloonSway var(--sw) var(--sd) ease-in-out infinite alternate;
}
@keyframes balloonSway {
    0%   { transform:translateY(0)    rotate(var(--r1)); }
    100% { transform:translateY(-18px) rotate(var(--r2)); }
}

.btn-dl {
    margin:42px; padding:20px 76px;
    background:linear-gradient(135deg,#1e3a8a,#1e40af); color:#fff;
    border-radius:100px; font-family:'Josefin Sans',sans-serif;
    font-size:23px; font-weight:700; letter-spacing:0.12em;
    border:none; cursor:pointer; box-shadow:0 14px 40px rgba(0,0,0,0.55);
    transition:transform 0.2s,box-shadow 0.2s;
}
.btn-dl:hover { transform:translateY(-4px); box-shadow:0 22px 50px rgba(0,0,0,0.65); }
</style>
</head>

            <rect x="947" y="492" width="2" height="14" rx="1" fill="#F0CE78" opacity="0.38" transform="rotate(45,948,499)"/>
            <rect x="947" y="492" width="2" height="14" rx="1" fill="#F0CE78" opacity="0.38" transform="rotate(135,948,499)"/>
        </g>

        <!-- Corner line accents -->
        <g stroke="rgba(201,150,58,0.18)" stroke-width="1" fill="none">
            <line x1="820" y1="155" x2="1000" y2="155"/>
            <line x1="1000" y1="155" x2="1000" y2="335"/>
            <line x1="80"  y1="1765" x2="260"  y2="1765"/>
            <line x1="80"  y1="1765" x2="80"   y2="1585"/>
        </g>
    </svg>

    <!-- ══════════ CONTENT ══════════ -->
    <div class="content">
        <div class="logo-wrap">
            <img src="{{ logo_url }}" alt="Bank Logo" onerror="this.style.opacity='0.3'">
        </div>

        <div class="eyebrow">
            <div class="eyebrow-dot"></div>
            <div class="eyebrow-text">Warm Wishes on Your</div>
            <div class="eyebrow-dot"></div>
        </div>

        <div class="bday-headline">Birthday</div>

        <div class="rule">
            <div class="rule-line"></div>
            <div class="rule-diamond"></div>
            <div class="rule-diamond" style="width:6px;height:6px;opacity:0.55;box-shadow:none"></div>
            <div class="rule-diamond"></div>
            <div class="rule-line"></div>
        </div>

        <div class="photo-wrap">
            <div class="orbit"><div class="orbit-dot"></div></div>
            <div class="photo-ring"></div>
            <div class="photo-ring-inner"></div>
            <div class="photo-circle">
                <img id="emp-photo" src="{{ photo_url }}" alt="Employee Photo"
                     onerror="this.style.display='none';document.getElementById('ph-placeholder').style.display='flex'">
                <div class="photo-placeholder" id="ph-placeholder">
                    <svg viewBox="0 0 100 100" fill="none">
                        <circle cx="50" cy="36" r="20" fill="rgba(201,150,58,0.45)"/>
                        <ellipse cx="50" cy="85" rx="30" ry="18" fill="rgba(201,150,58,0.45)"/>
                    </svg>
                </div>
            </div>
            <div class="photo-glow"></div>
        </div>

        <div class="details">
            <div class="stars-row">
                <span>✦</span><span class="big">★</span><span>✦</span>
            </div>
            <span class="emp-name" id="emp-name">{{ employee_name }}</span>
            <div class="desig-pill" id="desig-pill">{{ designation }}</div>
            <div class="branch-text">{{ branch }}</div>
        </div>
    </div>
</div>

<button class="btn-dl" onclick="doExport()">📥 Download Poster PNG</button>

<script>
function fitText(elId, maxPx, minPx) {
    const el = document.getElementById(elId);
    if (!el) return;
    let px = maxPx;
    el.style.fontSize = px + 'px';
    while (el.scrollWidth > 920 && px > minPx) {
        px -= 1;
        el.style.fontSize = px + 'px';
    }
}

function spawnAnimatedConfetti() {
    const poster = document.getElementById('poster');
    const colors = ['#C9963A','#F0CE78','#C03868','#7B4BBF','#1A8A9A','#E05050'];
    for (let i = 0; i < 26; i++) {
        const color = colors[i % colors.length];
        const type  = i % 4;
        const el    = document.createElement('div');
        el.className = 'confetti-piece';
        let inner = '';
        if (type === 0) inner = `width:10px;height:10px;background:${color};border-radius:2px;`;
        else if (type === 1) inner = `width:9px;height:9px;background:${color};transform:rotate(45deg);`;
        else if (type === 2) inner = `width:14px;height:5px;background:${color};border-radius:3px;`;
        else inner = `width:7px;height:7px;background:${color};border-radius:50%;`;
        const dur  = (4 + Math.random() * 5).toFixed(1);
        const del  = (Math.random() * 6).toFixed(1);
        const sy   = `${-(60 + Math.random() * 80)}px`;
        const ey   = `${1700 + Math.random() * 280}px`;
        const rot  = `${Math.floor(Math.random() * 720)}deg`;
        const op   = (0.3 + Math.random() * 0.45).toFixed(2);
        const left = (2 + Math.random() * 96).toFixed(1);
        el.style.cssText = `${inner}left:${left}%;top:0%;--dur:${dur}s;--del:${del}s;--sy:${sy};--ey:${ey};--rot:${rot};--op:${op};`;
        poster.appendChild(el);
    }
}

function spawnSparkles() {
    const poster = document.getElementById('poster');
    [[9,12,4,0.12,0.45,4,0],[84,8,3,0.1,0.38,5,1.2],[22,28,5,0.18,0.55,3.5,0.4],
     [77,22,3,0.08,0.35,6,2.1],[4,58,4,0.14,0.48,4.5,1.6],[94,52,3,0.09,0.4,5.5,0.7],
     [14,78,5,0.2,0.52,4,2.4],[82,74,4,0.14,0.44,3.8,0.2],[48,6,3,0.09,0.34,5.2,1.1],
     [38,90,4,0.15,0.5,4.3,0.6],[62,86,3,0.1,0.38,5.1,1.9],[52,18,2.5,0.08,0.32,5,2.7]]
    .forEach(([x,y,s,lo,hi,dur,del]) => {
        const p = document.createElement('div');
        p.className = 'sparkle';
        p.style.cssText = `left:${x}%;top:${y}%;width:${s}px;height:${s}px;`
            + `--lo:${lo};--hi:${hi};--dur:${dur}s;--del:${del}s;`
            + `box-shadow:0 0 ${s*3}px rgba(201,150,58,0.7);`;
        poster.appendChild(p);
    });
}

function init() {
    fitText('emp-name', 88, 26);
    fitText('desig-pill', 30, 14);
    spawnAnimatedConfetti();
    spawnSparkles();
}

if (document.fonts) document.fonts.ready.then(init);
else window.addEventListener('load', init);

function doExport() {
    fitText('emp-name', 88, 26);
    fitText('desig-pill', 30, 14);
    const area = document.getElementById('poster');
    const btn  = document.querySelector('.btn-dl');
    btn.style.display = 'none';
    setTimeout(() => {
        html2canvas(area, {
            scale:2, useCORS:true, allowTaint:true,
            backgroundColor:'#010C1E',
            scrollX:0, scrollY:-window.scrollY,
            x:0, y:0, width:1080, height:1920,
            windowWidth:1080, windowHeight:1920,
        }).then(canvas => {
            const a = document.createElement('a');
            a.download = 'Birthday_Poster.png';
            a.href = canvas.toDataURL('image/png', 1.0);
            a.click();
            btn.style.display = 'block';
        });
    }, 350);
}
</script>
</body>
</html>
