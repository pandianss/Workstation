{% extends "base_premium.html" %}

{% block content %}
<div class="doc-title">
    <h2 class="main-title">OFFICE NOTE / कार्यालय टिप्पणी</h2>
</div>

<div class="letter-body">
    <div class="section-title">SUBJECT: {{ subject }}</div>
    
    <div class="section-title">1. Introduction</div>
    <div style="margin-bottom: 20px;">
        {{ intro_text | safe }}
    </div>

    <div class="section-title">2. Observations</div>
    <div style="margin-bottom: 20px;">
        {{ observations | safe }}
    </div>

    <div class="section-title">3. Recommendations</div>
    <div style="margin-bottom: 20px;">
        {{ recommendations | safe }}
    </div>
</div>
{% endblock %}
