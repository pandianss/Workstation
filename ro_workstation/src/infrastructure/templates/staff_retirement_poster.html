<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Cinzel:wght@700;900&family=Josefin+Sans:wght@300;400;600;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #FDFCF7; /* Luxury Cream */
            --gold:    #A37E2C; 
            --gold-lt: #C5A059;
            --text:    #0F172A;
            --text-lt: #475569;
            --white:   #FFFFFF;
            --accent:  #C03868;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#F1F5F9;
            display:flex;
            flex-direction:column;
            align-items:center;
            font-family:'Josefin Sans', sans-serif;
            padding: 20px 0;
        }

        #poster {
            width:1080px;
            height:1920px;
            position:relative;
            overflow:hidden;
            background:var(--bg);
        }

        .bg-layer {
            position:absolute; inset:0;
            background: 
                radial-gradient(circle at 50% 0%, rgba(163,126,44,0.06) 0%, transparent 75%),
                radial-gradient(circle at 100% 100%, rgba(192,56,104,0.03) 0%, transparent 40%),
                var(--bg);
        }

        /* 🏛️ Heritage Frame */
        .corner { position:absolute; width:130px; height:130px; z-index:10; }
        .corner.tl { top:45px; left:45px; border-top:2px solid var(--gold); border-left:2px solid var(--gold); }
        .corner.tr { top:45px; right:45px; border-top:2px solid var(--gold); border-right:2px solid var(--gold); }
        .corner.bl { bottom:45px; left:45px; border-bottom:2px solid var(--gold); border-left:2px solid var(--gold); }
        .corner.br { bottom:45px; right:45px; border-bottom:2px solid var(--gold); border-right:2px solid var(--gold); }

        .content {
            position:relative; z-index:20;
            width:100%; height:100%;
            display:flex; flex-direction:column; align-items:center;
            padding:110px 80px;
        }

        .logo-wrap { margin-bottom:50px; flex-shrink:0; }
        .logo-wrap img { max-width:340px; max-height:155px; object-fit:contain; }

        .eyebrow {
            display:flex; align-items:center; gap:20px; margin-bottom:15px;
        }
        .eyebrow-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; }
        .eyebrow-text {
            font-size:26px; font-weight:400; letter-spacing:0.45em;
            color:var(--gold); text-transform:uppercase;
        }

        .milestone-headline {
            font-family:'Cormorant Garamond', serif;
            font-size:155px; font-weight:700; font-style:italic;
            line-height:0.95; color:var(--text); letter-spacing:-1px;
            text-align: center; margin-bottom: 10px;
        }

        .rule {
            display:flex; align-items:center; gap:16px;
            margin:35px 0; width:680px;
        }
        .rule-line {
            flex:1; height:1px;
            background:linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
            opacity:0.4;
        }
        .rule-diamond {
            width:10px; height:10px; background:var(--gold);
            transform:rotate(45deg); flex-shrink:0;
        }

        .photo-wrap {
            position:relative; width:640px; height:640px;
            display:flex; align-items:center; justify-content:center;
            margin: 45px 0;
        }
        .photo-ring {
            position:absolute; inset:-12px; border-radius:50%;
            border:2px solid rgba(163,126,44,0.25);
            animation: ringSpin 25s linear infinite;
        }
        @keyframes ringSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .photo-border {
            position:absolute; inset:0; border-radius:50%;
            border:10px double var(--gold);
            background: #fff;
            padding: 10px;
            box-shadow: 0 40px 80px rgba(163,126,44,0.18);
        }
        .photo-circle {
            width:100%; height:100%; border-radius:50%; overflow:hidden;
            background:#f8fafc; display:flex; align-items:center; justify-content:center;
        }
        .photo-circle img { width:100%; height:100%; object-fit:cover; }

        .details { margin-top:55px; text-align:center; width:100%; }
        .emp-name-en {
            font-family:'Cinzel', serif; font-size:94px; font-weight:900;
            line-height:1; color:var(--text); letter-spacing:2px;
            margin-bottom: 15px;
        }
        .emp-name-ta {
            font-family:'Noto Sans Tamil', sans-serif; font-size:62px; font-weight:700;
            color:var(--gold); margin-bottom: 35px;
        }
        .desig-pill {
            display:inline-block;
            padding:15px 55px; border-radius:100px;
            background:rgba(163,126,44,0.04); border:1.5px solid rgba(163,126,44,0.4);
            font-size:30px; font-weight:600; letter-spacing:0.12em;
            color:var(--text-lt); text-transform:uppercase;
        }
        .branch-text {
            margin-top:22px; font-size:28px; font-weight:300;
            letter-spacing:0.35em; color:var(--text-lt); text-transform:uppercase;
            opacity:0.75;
        }

        .region-tag {
            position:absolute; bottom:90px;
            font-size:25px; font-weight:700; letter-spacing:0.6em;
            color:var(--gold); text-transform:uppercase;
        }

        /* 🎉 Confetti */
        .confetti {
            position:absolute; width:12px; height:12px; border-radius:2px;
            z-index:15; pointer-events:none;
            animation: fall var(--dur) var(--del) linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity:0; }
            10% { opacity:1; }
            100% { transform: translateY(2000px) rotate(720deg); opacity:0; }
        }

        /* 📥 Download UI */
        .export-btn {
            margin:40px; padding:25px 95px;
            background:linear-gradient(135deg, #1e293b, #0f172a); color:#fff;
            border-radius:100px; font-size:24px; font-weight:700;
            border:none; cursor:pointer; box-shadow:0 20px 45px rgba(0,0,0,0.25);
            transition: transform 0.2s;
        }
        .export-btn:hover { transform:translateY(-5px); }

    </style>
</head>
<body>
    <div id="poster">
        <div class="bg-layer"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <!-- ══════════ DECORATIONS ══════════ -->
        <svg style="position:absolute; inset:0; width:100%; height:100%; z-index:5; pointer-events:none;" viewBox="0 0 1080 1920">
            {% if milestone_type == "BIRTHDAY" %}
            <!-- 🎈 Balloons (Adapted for light background) -->
            <g transform="translate(100,280)">
                <ellipse cx="0" cy="0" rx="50" ry="62" fill="#E11D48" opacity="0.12"/>
                <ellipse cx="25" cy="-25" rx="45" ry="56" fill="#D4AF37" opacity="0.15"/>
            </g>
            <g transform="translate(980,320)">
                <ellipse cx="0" cy="0" rx="50" ry="62" fill="#D4AF37" opacity="0.15"/>
                <ellipse cx="-25" cy="-25" rx="45" ry="56" fill="#2563EB" opacity="0.12"/>
            </g>

            <!-- 🎂 Birthday Cake (Bottom) -->
            <g transform="translate(540,1830) scale(1.1)">
                <rect x="-110" y="-55" width="220" height="60" rx="8" fill="#F8FAFC" stroke="var(--gold)" stroke-width="1"/>
                <rect x="-75" y="-105" width="150" height="50" rx="8" fill="#FFFFFF" stroke="var(--gold)" stroke-width="1"/>
                <!-- Candles -->
                <rect x="-40" y="-140" width="8" height="35" rx="2" fill="#E11D48"/>
                <rect x="0" y="-145" width="8" height="40" rx="2" fill="#D4AF37"/>
                <rect x="40" y="-140" width="8" height="35" rx="2" fill="#2563EB"/>
                <!-- Flames -->
                <circle cx="-36" cy="-148" r="5" fill="#FBBF24"/>
                <circle cx="4" cy="-153" r="5" fill="#FBBF24"/>
                <circle cx="44" cy="-148" r="5" fill="#FBBF24"/>
            </g>
            {% else %}
            <!-- 🌅 Retirement Decoration (Elegant Sun) -->
            <g transform="translate(540,1850)">
                <circle cx="0" cy="0" r="100" fill="url(#sunGrad)" opacity="0.1"/>
                <defs>
                    <radialGradient id="sunGrad"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="transparent"/></radialGradient>
                </defs>
            </g>
            {% endif %}
            
            <!-- Flourishes -->
            <path d="M80,100 Q200,70 320,110" stroke="var(--gold)" stroke-width="0.5" fill="none" opacity="0.4"/>
            <path d="M1000,100 Q880,70 760,110" stroke="var(--gold)" stroke-width="0.5" fill="none" opacity="0.4"/>
        </svg>

        <div class="content">
            <div class="logo-wrap">
                <img src="{{ logo_url }}" alt="Bank Logo">
            </div>

            <div class="eyebrow">
                <div class="eyebrow-dot"></div>
                <div class="eyebrow-text">Warm Wishes on your</div>
                <div class="eyebrow-dot"></div>
            </div>

            <div class="milestone-headline">
                {% if milestone_type == "BIRTHDAY" %} Birthday {% else %} Retirement {% endif %}
            </div>

            <div class="rule">
                <div class="rule-line"></div>
                <div class="rule-diamond"></div>
                <div class="rule-line"></div>
            </div>

            <div class="photo-wrap">
                <div class="photo-ring"></div>
                <div class="photo-border">
                    <div class="photo-circle">
                        <img src="{{ photo_url }}" alt="Staff Photo" onerror="this.src='https://ui-avatars.com/api/?name={{ name_en }}&background=f8fafc&color=A37E2C&size=512&font-size=0.33&bold=true'">
                    </div>
                </div>
            </div>

            <div class="details">
                <div class="emp-name-en">{{ name_en }}</div>
                <div class="emp-name-ta">{{ name_ta }}</div>
                <div class="desig-pill">{{ designation }}</div>
                <div class="branch-text">{{ branch_name }}</div>
            </div>

            <div class="region-tag">DINDIGUL REGION</div>
        </div>
    </div>

    <button class="export-btn" onclick="doExport()">📥 Download Milestone Poster (PNG)</button>

    <script>
        function spawnConfetti() {
            const poster = document.getElementById('poster');
            const colors = ['#A37E2C', '#C5A059', '#C03868', '#2563EB', '#E11D48'];
            for(let i=0; i<35; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                const color = colors[Math.floor(Math.random()*colors.length)];
                const left = Math.random()*100;
                const dur = 4 + Math.random()*4;
                const del = Math.random()*5;
                el.style.cssText = `left:${left}%; background:${color}; --dur:${dur}s; --del:${del}s;`;
                poster.appendChild(el);
            }
        }
        spawnConfetti();

        function doExport() {
            const area = document.getElementById('poster');
            const btn = document.querySelector('.export-btn');
            btn.style.display = 'none';

            setTimeout(() => {
                html2canvas(area, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#FDFCF7',
                    width: 1080,
                    height: 1920
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Milestone_{{ name_en }}.png';
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                    btn.style.display = 'block';
                });
            }, 350);
        }
    </script>
</body>
</html>
