<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Birthday Greeting – {{ name_en }}</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #D4AF37;
  --gold-lt: #F4E4BC;
  --navy-dark: #020617;
}

html, body {
  width: 100%; height: 100%;
  background: #000;
  display: flex; justify-content: center; align-items: center;
  font-family: 'Cormorant Garamond', serif;
  overflow: hidden;
}

/* 🖼️ High-Density Poster Container (1080x1920) */
#poster {
  width: 1080px;
  height: 1920px;
  position: relative;
  background: url("{{ bg_url }}") no-repeat center center;
  background-size: cover;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 100px 60px;
  box-shadow: 0 0 100px rgba(0,0,0,1);
  transform-origin: center center;
  color: white;
}

/* 🏛️ Header: Official Bank Logo */
.logo-header {
  margin-top: 40px;
  margin-bottom: 80px;
  z-index: 10;
}
.logo-header img {
  max-width: 500px;
  height: auto;
}

/* 🔡 Typography */
.pre-title {
  font-size: 32px;
  letter-spacing: 20px;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 300;
  margin-bottom: 20px;
}

.main-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 160px;
  font-weight: 900;
  line-height: 0.9;
  text-align: center;
  background: linear-gradient(to bottom, #fff 0%, var(--gold-lt) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
  margin-bottom: 60px;
}

/* 🎂 Premium Cake Element (Sticker Style) */
.cake-container {
  width: 850px;
  height: 850px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  margin-bottom: 40px;
}
.cake-img {
  width: 100%;
  height: auto;
  /* Since generated on white bg, multiply makes white transparent */
  mix-blend-mode: multiply; 
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
}

/* 👤 Staff Details Section */
.staff-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-grow: 1;
  justify-content: flex-start;
  padding-top: 20px;
}

.staff-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 110px;
  font-weight: 900;
  color: white;
  text-shadow: 0 0 50px rgba(212,175,55,0.6);
  margin-bottom: 15px;
  text-align: center;
  line-height: 1.1;
}

.staff-desig {
  font-family: 'Cinzel', serif;
  font-size: 38px;
  letter-spacing: 10px;
  color: var(--gold-lt);
  text-transform: uppercase;
  margin-bottom: 60px;
}

/* 🏢 Branch Box */
.branch-box {
  width: 880px;
  padding: 40px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px;
  text-align: center;
}
.branch-label {
  font-size: 24px;
  color: var(--gold);
  letter-spacing: 12px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.branch-name {
  font-family: 'Cinzel', serif;
  font-size: 72px;
  font-weight: 900;
  color: white;
  letter-spacing: 8px;
}

/* 🚩 Footer */
.footer-tag {
  position: absolute;
  bottom: 60px;
  font-family: 'Cinzel', serif;
  font-size: 28px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 15px;
  text-transform: uppercase;
}

/* UI Controls */
.controls {
  position: fixed;
  bottom: 40px;
  right: 40px;
  z-index: 1000;
}
.btn {
  padding: 20px 50px;
  background: var(--gold);
  color: black;
  border-radius: 100px;
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: 24px;
  border: none;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

</style>
</head>
<body>

<div id="poster">
  <div class="logo-header">
    <img src="{{ logo_url }}" alt="Bank Logo">
  </div>

  <div class="pre-title">Warmest Wishes On Your</div>
  <div class="main-title">BIRTHDAY</div>

  <div class="cake-container">
    <img src="{{ cake_url }}" class="cake-img" alt="Luxury Birthday Cake">
  </div>

  <div class="staff-section">
    <div class="staff-name">{{ name_en }}</div>
    <div class="staff-desig">{{ designation }}</div>

    <div class="branch-box">
      <div class="branch-label">Branch</div>
      <div class="branch-name">{{ branch_name }}</div>
    </div>
  </div>

  <div class="footer-tag">Dindigul Region</div>
</div>

<div class="controls">
  <button class="btn" onclick="downloadPoster()">📥 DOWNLOAD POSTER</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function autoScale() {
  const poster = document.getElementById('poster');
  const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920) * 0.85;
  poster.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', autoScale);
autoScale();

function downloadPoster() {
  const poster = document.getElementById('poster');
  const controls = document.querySelector('.controls');
  
  const oldTransform = poster.style.transform;
  poster.style.transform = 'none';
  controls.style.display = 'none';

  setTimeout(() => {
    html2canvas(poster, {
      width: 1080,
      height: 1920,
      scale: 1,
      useCORS: true,
      backgroundColor: '#020617'
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'Birthday_Poster_{{ name_en }}.png';
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
      
      poster.style.transform = oldTransform;
      controls.style.display = 'block';
    });
  }, 100);
}
</script>
</body>
</html>
