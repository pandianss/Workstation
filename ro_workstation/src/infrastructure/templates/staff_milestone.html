<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Cinzel:wght@400;700;900&family=Josefin+Sans:wght@300;400;600;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4BC;
            --navy: #0F172A;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.92);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Josefin Sans', sans-serif;
            min-height: 100vh;
        }

        #poster {
            width: 1080px;
            height: 1920px;
            position: relative;
            background: url("{{ celebratory_bg }}") no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 80px;
            overflow: hidden;
        }

        /* 🏛️ Header Logo */
        .logo-wrap {
            background: var(--white);
            padding: 30px 60px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 140px;
            z-index: 10;
        }
        .logo-wrap img {
            max-width: 400px;
            height: auto;
        }

        /* 💎 Main Content Card (Glassmorphism) */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 920px;
            border-radius: 40px;
            border: 2px solid var(--gold);
            padding: 100px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            position: relative;
            z-index: 5;
        }

        .eyebrow {
            font-size: 32px;
            letter-spacing: 0.5em;
            color: var(--navy);
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .headline {
            font-family: 'Cinzel', serif;
            font-size: 160px;
            font-weight: 900;
            color: var(--navy);
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--navy), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-wrap {
            margin: 60px 0;
        }
        .icon-wrap img {
            width: 320px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(212,175,55,0.4));
        }

        .details {
            width: 100%;
            margin-top: 40px;
        }

        .staff-name {
            font-family: 'Cinzel', serif;
            font-size: 100px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .staff-name-local {
            font-family: 'Noto Sans Tamil', sans-serif;
            font-size: 72px;
            color: var(--gold);
            margin-bottom: 50px;
            font-weight: 700;
        }

        .desig-pill {
            display: inline-block;
            padding: 20px 70px;
            border-radius: 100px;
            background: var(--navy);
            color: var(--white);
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .branch-info {
            font-size: 32px;
            color: var(--navy);
            opacity: 0.8;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* 🎖️ Region Footer */
        .footer-tag {
            position: absolute;
            bottom: 100px;
            font-family: 'Cinzel', serif;
            font-size: 40px;
            color: var(--gold);
            letter-spacing: 1em;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 📥 Export Button */
        .export-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            padding: 25px 60px;
            background: var(--navy);
            color: white;
            border-radius: 100px;
            font-size: 24px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .export-btn:hover { background: #1e293b; }

    </style>
</head>
<body>
    <div id="poster">
        <div class="logo-wrap">
            <img src="{{ logo_url }}" alt="IOB Logo">
        </div>

        <div class="glass-card">
            <div class="eyebrow">Warmest Wishes On Your</div>
            <div class="headline">{% if milestone_type == "BIRTHDAY" %}BIRTHDAY{% else %}RETIREMENT{% endif %}</div>
            
            <div class="icon-wrap">
                <img src="{{ celebratory_icon }}" alt="Icon">
            </div>

            <div class="details">
                <div class="staff-name">{{ name_en }}</div>
                {% if name_ta %}
                <div class="staff-name-local">{{ name_ta }}</div>
                {% endif %}
                <div class="desig-pill">{{ designation }}</div>
                <div class="branch-info">{{ branch_name }}</div>
            </div>
        </div>

        <div class="footer-tag">Dindigul Region</div>
    </div>

    <button class="export-btn" onclick="doExport()">📥 Download Premium Poster (PNG)</button>

    <script>
        function doExport() {
            const area = document.getElementById('poster');
            const btn = document.querySelector('.export-btn');
            btn.style.display = 'none';

            setTimeout(() => {
                html2canvas(area, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    width: 1080,
                    height: 1920
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Celebration_{{ name_en }}.png';
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                    btn.style.display = 'block';
                });
            }, 300);
        }
    </script>
</body>
</html>
